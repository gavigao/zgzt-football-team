<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>政国中统男子足球队 | 相册</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark team-navbar sticky-top" aria-label="主导航">
      <div class="container">
        <a class="navbar-brand d-flex align-items-center" href="index.html">
          <img src="img/logo-placeholder.png" alt="球队 Logo 占位" class="team-logo me-2">
          <span>政国中统足球队</span>
        </a>
        <button class="navbar-toggler text-white border border-light" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar" aria-controls="mainNavbar" aria-expanded="false" aria-label="切换导航">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNavbar">
          <ul class="navbar-nav ms-auto mb-2 mb-lg-0 gap-lg-2">
            <li class="nav-item"><a class="nav-link" href="index.html">首页</a></li>
            <li class="nav-item"><a class="nav-link" href="history.html">球队历史</a></li>
            <li class="nav-item"><a class="nav-link" href="roster.html">球队阵容</a></li>
            <li class="nav-item"><a class="nav-link" href="matches.html">赛事战绩</a></li>
            <li class="nav-item"><a class="nav-link" href="honors.html">荣誉殿堂</a></li>
            <li class="nav-item"><a class="nav-link active" href="gallery.html">相册</a></li>
            <li class="nav-item"><a class="nav-link" href="about.html">关于我们</a></li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="section-block">
      <div class="container">
        <h1 class="section-heading mb-1">球队相册</h1>
        <p class="section-subheading">数据来源于 data/gallery.json，添加新图片只需在 JSON 中添加一条记录即可。</p>

        <section class="mb-4">
          <h2 class="h5 mb-3">分类筛选</h2>
          <div id="galleryFilters" class="gallery-filter">
            <button class="btn btn-team-primary active" data-filter="all">全部</button>
            <button class="btn btn-team-outline" data-filter="match">比赛</button>
            <button class="btn btn-team-outline" data-filter="training">训练</button>
            <button class="btn btn-team-outline" data-filter="team">团建</button>
          </div>
        </section>

        <section>
          <div id="galleryGrid" class="row g-3">
            <div class="col-12"><div class="empty-state">相册数据加载中...</div></div>
          </div>
        </section>
      </div>
    </main>

    <div class="modal fade" id="galleryModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h2 class="modal-title fs-5" id="galleryModalCaption">图片说明</h2>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="关闭"></button>
          </div>
          <div class="modal-body">
            <div id="galleryModalBody" class="lightbox-placeholder">图片预览区域（请将图片文件放入 img/gallery/ 目录，并修改 gallery.json 中的 url 字段）</div>
            <p id="galleryModalDesc" class="mt-2 mb-0 small text-muted"></p>
            <p class="mb-0 small text-muted">分类：<span id="galleryModalTag">未分类</span> · 日期：<span id="galleryModalDate">-</span></p>
          </div>
        </div>
      </div>
    </div>

    <footer class="team-footer py-4">
      <div class="container text-center">
        <p>政国中统男子足球队 · 建队于 2015</p>
        <p>Copyright © <span id="footerYear"></span> 政国中统男子足球队. All Rights Reserved.</p>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
    <script>
      (function () {
        "use strict";

        const GALLERY_CATEGORY_LABELS = { match: "比赛", training: "训练", team: "团建" };

        async function initGallery() {
          const grid = document.getElementById("galleryGrid");
          const filterWrap = document.getElementById("galleryFilters");
          const modalElement = document.getElementById("galleryModal");

          if (!grid || !filterWrap) return;

          let galleryData = [];
          let activeFilter = "all";
          let galleryModal = null;

          if (modalElement && typeof bootstrap !== "undefined") {
            galleryModal = bootstrap.Modal.getOrCreateInstance(modalElement);
          }

          try {
            const res = await fetch("data/gallery.json", { cache: "no-store" });
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            galleryData = await res.json();
          } catch (err) {
            grid.innerHTML = '<div class="col-12"><div class="load-error">相册数据加载失败，请检查 data/gallery.json 是否存在。</div></div>';
            return;
          }

          function renderGrid(filter) {
            const filtered = filter === "all" ? galleryData : galleryData.filter(item => item.category === filter);

            if (!filtered.length) {
              grid.innerHTML = '<div class="col-12"><div class="empty-state">该分类下暂无图片。</div></div>';
              return;
            }

            grid.innerHTML = filtered.map(item => `
              <div class="col-6 col-lg-4 gallery-item" data-category="${item.category}" data-title="${item.title}" data-id="${item.id}">
                <article class="h-100">
                  <div class="gallery-placeholder">${item.title}</div>
                  <p class="small text-muted mt-2 mb-0">${GALLERY_CATEGORY_LABELS[item.category] || item.category} · ${item.date}</p>
                </article>
              </div>
            `).join("");

            // 绑定点击事件
            grid.querySelectorAll(".gallery-item").forEach(el => {
              el.addEventListener("click", () => {
                const id = Number(el.dataset.id);
                const item = galleryData.find(g => g.id === id);
                if (!item || !galleryModal) return;

                document.getElementById("galleryModalCaption").textContent = item.title;
                document.getElementById("galleryModalTag").textContent = GALLERY_CATEGORY_LABELS[item.category] || item.category;
                document.getElementById("galleryModalDate").textContent = item.date;
                document.getElementById("galleryModalDesc").textContent = item.description || "";

                // 图片区域：如果有 url 则显示图片，否则显示提示
                const body = document.getElementById("galleryModalBody");
                if (item.url) {
                  body.innerHTML = `<img src="${item.url}" alt="${item.title}" style="width:100%;border-radius:0.5rem;">`;
                } else {
                  body.innerHTML = `<div class="lightbox-placeholder">请将图片放入 img/gallery/ 目录<br>并修改 gallery.json 中对应记录的 url 字段</div>`;
                }

                galleryModal.show();
              });
            });
          }

          // 筛选按钮
          filterWrap.addEventListener("click", e => {
            const btn = e.target.closest("button[data-filter]");
            if (!btn) return;
            filterWrap.querySelectorAll("button").forEach(b => {
              b.classList.remove("btn-team-primary", "active");
              b.classList.add("btn-team-outline");
            });
            btn.classList.remove("btn-team-outline");
            btn.classList.add("btn-team-primary", "active");
            activeFilter = btn.dataset.filter;
            renderGrid(activeFilter);
          });

          renderGrid("all");
        }

        document.addEventListener("DOMContentLoaded", initGallery);
      })();
    </script>
  </body>
</html>
