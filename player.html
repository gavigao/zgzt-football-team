<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>球员信息 | 政国中统男子足球队</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
      .player-hero {
        background: linear-gradient(135deg, #122748 0%, #1a3a6b 60%, #204a85 100%);
        color: #fff;
        padding: 3rem 0 2rem;
      }
      .player-avatar-lg {
        width: 130px;
        height: 130px;
        border-radius: 50%;
        background: rgba(255,255,255,0.15);
        border: 3px solid rgba(255,255,255,0.35);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 3.5rem;
        color: rgba(255,255,255,0.7);
        overflow: hidden;
      }
      .player-avatar-lg img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .player-jersey {
        font-family: "Teko", sans-serif;
        font-size: 5rem;
        font-weight: 700;
        line-height: 1;
        color: rgba(255,255,255,0.35);
        position: absolute;
        right: 1.5rem;
        top: 0.5rem;
      }
      .player-meta-badge {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        background: rgba(255,255,255,0.15);
        border-radius: 999px;
        padding: 0.35rem 0.85rem;
        font-size: 0.85rem;
        color: rgba(255,255,255,0.9);
      }
      .player-stat-card {
        background: #fff;
        border: 1px solid #e8edf4;
        border-radius: 0.85rem;
        box-shadow: 0 6px 16px rgba(20,40,70,0.07);
        padding: 1.25rem;
        text-align: center;
      }
      .player-stat-value {
        font-family: "Teko", sans-serif;
        font-size: 2.4rem;
        font-weight: 700;
        color: #1a3a6b;
        line-height: 1;
      }
      .player-stat-label {
        font-size: 0.82rem;
        color: #888;
        margin-top: 0.2rem;
      }
      .honor-tag {
        display: inline-flex;
        align-items: center;
        gap: 0.3rem;
        background: #edf3fb;
        color: #1a3a6b;
        border-radius: 4px;
        padding: 0.25rem 0.6rem;
        font-size: 0.82rem;
        font-weight: 600;
        margin: 0.2rem;
      }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark team-navbar sticky-top" aria-label="主导航">
      <div class="container">
        <a class="navbar-brand d-flex align-items-center" href="index.html">
          <img src="img/logo-placeholder.png" alt="球队 Logo 占位" class="team-logo me-2">
          <span>政国中统足球队</span>
        </a>
        <button class="navbar-toggler text-white border border-light" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar" aria-controls="mainNavbar" aria-expanded="false" aria-label="切换导航">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNavbar">
          <ul class="navbar-nav ms-auto mb-2 mb-lg-0 gap-lg-2">
            <li class="nav-item"><a class="nav-link" href="index.html">首页</a></li>
            <li class="nav-item"><a class="nav-link" href="history.html">球队历史</a></li>
            <li class="nav-item"><a class="nav-link" href="roster.html">球队阵容</a></li>
            <li class="nav-item"><a class="nav-link" href="matches.html">赛事战绩</a></li>
            <li class="nav-item"><a class="nav-link" href="honors.html">荣誉殿堂</a></li>
            <li class="nav-item"><a class="nav-link" href="gallery.html">相册</a></li>
            <li class="nav-item"><a class="nav-link" href="about.html">关于我们</a></li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- 球员 Hero 区域 -->
    <div class="player-hero position-relative" id="playerHero">
      <div class="container">
        <a href="roster.html" class="text-white-50 text-decoration-none small mb-3 d-inline-block">&larr; 返回阵容</a>
        <div class="d-flex align-items-end gap-4 mt-2 position-relative">
          <div class="player-avatar-lg" id="playerAvatar">
            <i class="bi bi-person-fill"></i>
          </div>
          <div>
            <div class="player-meta-badge mb-2" id="playerPositionBadge">
              <i class="bi bi-person-fill"></i>
              <span>位置加载中</span>
            </div>
            <h1 class="mb-1" id="playerName" style="font-family:'Teko',sans-serif;font-size:3rem;letter-spacing:0.04em;">加载中...</h1>
            <p class="mb-0 text-white-50" id="playerJoinYear">-</p>
          </div>
          <span class="player-jersey" id="playerJersey">#-</span>
        </div>
      </div>
    </div>

    <main class="section-block">
      <div class="container">
        <!-- 个人简介 -->
        <section class="mb-4" id="bioSection" style="display:none;">
          <h2 class="section-heading">个人简介</h2>
          <div class="about-card p-3">
            <p class="mb-0" id="playerBio"></p>
          </div>
        </section>

        <!-- 生涯数据 -->
        <section class="mb-4" id="statsSection" style="display:none;">
          <h2 class="section-heading">生涯数据</h2>
          <div class="row g-3" id="statsGrid"></div>
        </section>

        <!-- 个人荣誉 -->
        <section class="mb-4" id="honorsSection" style="display:none;">
          <h2 class="section-heading">荣誉记录</h2>
          <div id="playerHonorsList"></div>
        </section>

        <!-- 最近比赛 -->
        <section class="mb-4" id="matchesSection" style="display:none;">
          <h2 class="section-heading">出场记录</h2>
          <div class="table-responsive">
            <table class="table align-middle">
              <thead>
                <tr>
                  <th>日期</th>
                  <th>赛事</th>
                  <th>对手</th>
                  <th>比分</th>
                  <th>结果</th>
                  <th>备注</th>
                </tr>
              </thead>
              <tbody id="playerMatchesBody"></tbody>
            </table>
          </div>
        </section>

        <!-- 无数据 / 错误状态 -->
        <div id="playerError" style="display:none;">
          <div class="empty-state" id="playerErrorMsg">球员数据加载中...</div>
          <div class="mt-3">
            <a class="btn btn-team-outline" href="roster.html">&larr; 返回阵容</a>
          </div>
        </div>
      </div>
    </main>

    <footer class="team-footer py-4">
      <div class="container text-center">
        <p>政国中统男子足球队 · 建队于 2015</p>
        <p>Copyright © <span id="footerYear"></span> 政国中统男子足球队. All Rights Reserved.</p>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      (function () {
        "use strict";

        const POSITION_LABELS = { goalkeeper: "门将", defender: "后卫", midfielder: "中场", forward: "前锋" };
        const POSITION_ICONS = { goalkeeper: "bi-shield-fill", defender: "bi-shield", midfielder: "bi-circle-fill", forward: "bi-lightning-fill" };

        function getParam(name) {
          return new URLSearchParams(window.location.search).get(name);
        }

        function getResultBadge(result) {
          const upper = (result || "").toUpperCase();
          if (upper === "W") return '<span class="badge-result badge-result-w">W / 胜</span>';
          if (upper === "D") return '<span class="badge-result badge-result-d">D / 平</span>';
          return '<span class="badge-result badge-result-l">L / 负</span>';
        }

        function formatDate(dateText) {
          const d = new Date(dateText);
          if (isNaN(d)) return dateText;
          return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
        }

        async function loadPlayerPage() {
          const playerId = getParam("id");
          const errorEl = document.getElementById("playerError");
          const errorMsgEl = document.getElementById("playerErrorMsg");

          if (playerId === null) {
            showError("未指定球员，请在阵容页点击球员查看。");
            return;
          }

          // 轻量 CSV 解析器
          function parseCSV(text) {
            const rows = [];
            let current = "";
            let inQuotes = false;
            for (let i = 0; i < text.length; i++) {
              const ch = text[i];
              if (ch === '"') {
                if (inQuotes && text[i + 1] === '"') { current += '"'; i++; }
                else { inQuotes = !inQuotes; }
              } else if ((ch === "," || ch === "\n") && !inQuotes) {
                if (ch === "\n") { if (current.trim() || rows.length > 0) rows.push(current.trim()); }
                else { rows.push(current.trim()); }
                current = "";
              } else {
                current += ch;
              }
            }
            if (current.trim()) rows.push(current.trim());
            if (rows.length === 0) return [];
            const headers = rows[0].split(",").map(h => h.trim().replace(/^"|"$/g, ""));
            const result = [];
            let colIndex = headers.length;
            while (colIndex < rows.length) {
              const values = [];
              for (let h = 0; h < headers.length; h++) { values.push(rows[colIndex + h] || ""); }
              const obj = {};
              headers.forEach((h, i) => { obj[h] = (values[i] || "").replace(/^"|"$/g, ""); });
              result.push(obj);
              colIndex += headers.length;
            }
            return result;
          }

          try {
            const [playersCSV, matchesRes, honorsRes] = await Promise.all([
              fetch("data/players.csv", { cache: "no-store" }),
              fetch("data/matches.json", { cache: "no-store" }),
              fetch("data/honors.json", { cache: "no-store" })
            ]);

            if (!playersCSV.ok) throw new Error("无法加载球员数据");
            const playersText = await playersCSV.text();
            const players = parseCSV(playersText).map(p => ({
              ...p,
              id: Number(p.id),
              join_year: p.join_year ? Number(p.join_year) : null
            }));
            const matches = matchesRes.ok ? await matchesRes.json() : [];
            const honors = honorsRes.ok ? await honorsRes.json() : [];

            const player = players.find(p => String(p.id) === String(playerId));

            if (!player) {
              showError(`未找到 #${playerId} 号球员。`);
              return;
            }

            renderPlayer(player, players, matches, honors);

          } catch (err) {
            showError("球员数据加载失败，请稍后刷新重试。");
            console.error(err);
          }
        }

        function showError(msg) {
          document.getElementById("playerError").style.display = "block";
          document.getElementById("playerErrorMsg").textContent = msg;
        }

        function renderPlayer(player, players, matches, honors) {
          // Hero 区域
          document.getElementById("playerName").textContent = player.name;
          document.getElementById("playerJersey").textContent = "#" + player.number;
          document.title = `${player.name} | 政国中统男子足球队`;

          const posLabel = POSITION_LABELS[player.group] || player.position || "未知";
          const posIcon = POSITION_ICONS[player.group] || "bi-person-fill";
          document.getElementById("playerPositionBadge").innerHTML =
            `<i class="bi ${posIcon}"></i><span>${posLabel}</span>`;

          if (player.join_year) {
            document.getElementById("playerJoinYear").textContent = `${player.join_year} 年加入球队`;
          } else {
            document.getElementById("playerJoinYear").textContent = "";
          }

          // 头像
          const avatarEl = document.getElementById("playerAvatar");
          if (player.avatar) {
            avatarEl.innerHTML = `<img src="${player.avatar}" alt="${player.name}">`;
          }

          // 个人简介
          if (player.bio && player.bio.trim()) {
            document.getElementById("bioSection").style.display = "block";
            document.getElementById("playerBio").textContent = player.bio;
          }

          // 计算生涯数据（从 matches.json 推算该球员参与场次）
          // 注意：当前 matches.json 没有记录每个球员的进球/助攻
          // 这里做简化处理：显示总出场场次
          const playedMatches = matches.filter(m => m.result); // 有 result 即为已完成比赛
          const totalMatches = playedMatches.length;

          if (totalMatches > 0) {
            const wins = playedMatches.filter(m => m.result.toUpperCase() === "W").length;
            const draws = playedMatches.filter(m => m.result.toUpperCase() === "D").length;
            const losses = playedMatches.filter(m => m.result.toUpperCase() === "L").length;

            document.getElementById("statsSection").style.display = "block";
            document.getElementById("statsGrid").innerHTML = `
              <div class="col-6 col-lg-3"><div class="player-stat-card"><div class="player-stat-value">${totalMatches}</div><div class="player-stat-label">总出场</div></div></div>
              <div class="col-6 col-lg-3"><div class="player-stat-card"><div class="player-stat-value" style="color:#1f8b4c">${wins}</div><div class="player-stat-label">胜</div></div></div>
              <div class="col-6 col-lg-3"><div class="player-stat-card"><div class="player-stat-value" style="color:#d9a441">${draws}</div><div class="player-stat-label">平</div></div></div>
              <div class="col-6 col-lg-3"><div class="player-stat-card"><div class="player-stat-value" style="color:#c0392b">${losses}</div><div class="player-stat-label">负</div></div></div>
            `;
          }

          // 个人荣誉
          const playerHonors = honors.filter(h => h.type === "personal" && h.player === player.name);
          if (playerHonors.length > 0) {
            document.getElementById("honorsSection").style.display = "block";
            document.getElementById("playerHonorsList").innerHTML = playerHonors.map(h => `
              <span class="honor-tag"><i class="bi bi-award-fill"></i>${h.title}（${h.season || h.year}）</span>
            `).join("");
          }

          // 出场记录（最近 10 场）
          const recentMatches = playedMatches.slice(0, 10);
          if (recentMatches.length > 0) {
            document.getElementById("matchesSection").style.display = "block";
            document.getElementById("playerMatchesBody").innerHTML = recentMatches.map(m => `
              <tr>
                <td>${formatDate(m.date)}</td>
                <td>${m.competition}</td>
                <td>${m.opponent}</td>
                <td>${m.score_us} : ${m.score_them}</td>
                <td>${getResultBadge(m.result)}</td>
                <td>${m.note || "-"}</td>
              </tr>
            `).join("");
          }
        }

        // 页脚年份
        document.getElementById("footerYear").textContent = new Date().getFullYear();

        loadPlayerPage();
      })();
    </script>
  </body>
</html>
